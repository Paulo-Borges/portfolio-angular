<section class="border-b-2 px-8 py-9">
  <div class="flex gap-3 items-center">
    <h1 class="text-white text-2xl font-semibold py-8">Meus Projetos</h1>
    <p class="border-b-2 w-[83%] h-1"></p>
</div>
    <div class="flex flex-wrap gap-4 justify-center">
      @for (project of projects; track project.title) {
        <div class="flex flex-col justify-center items-start bg-zinc-900 border hover:border-red-700 w-[300px] p-2 rounded-xl text-white">
          <img [src]="project.imageUrl" [alt]="project.title" width="100" class="mb-4">
          <h3 class="text-green-300">{{ project.title }}</h3>
          <p>{{ project.description }}</p>
          
          <div class="flex flex-col flex-1 mb-4">
            @for (tech of project.technologies; track tech) {
              <span class="">{{ tech }}</span>
            }
          </div>
  
          <div class="text-red-700 hover:text-red-300">
            <a [href]="project.githubUrl" target="_blank" class="btn-github">ver Repositório</a>
            
          </div>
        </div>
      }
    </div>
    <div class="flex gap-2 justify-center items-center bg-zinc-900 border hover:border-red-700 my-9 p-2 rounded-xl text-white">
        
        <a href="https://github.com/Paulo-Borges" target="_blank"><p><i class="bi bi-github"></i>  Ver todos os repositórios</p></a>
    </div>

   
  </section>
